<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Trackpad</title>
    <link rel="stylesheet" href="css/trackpad.css">
</head>
<body>
    <div id="app">
        <!-- Connection Status -->
        <div id="status-bar">
            <div id="connection-status" class="disconnected">
                <span class="status-dot"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </div>

        <!-- Main Trackpad Area -->
        <div id="trackpad">
            <div id="touch-indicator"></div>
            <div id="trackpad-label">Touch area</div>
        </div>

        <!-- Bottom Controls -->
        <div id="controls">
            <button id="btn-left" class="mouse-btn">Left Click</button>
            <button id="btn-right" class="mouse-btn">Right Click</button>
        </div>

        <!-- Settings Panel -->
        <div id="settings">
            <label>
                Sensitivity
                <input type="range" id="sensitivity" min="0.5" max="3" step="0.1" value="1.5">
                <span id="sensitivity-value">1.5</span>
            </label>
        </div>
    </div>

    <script src="js/trackpad.js"></script>
</body>
</html>
