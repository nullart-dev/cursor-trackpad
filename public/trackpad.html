<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Trackpad</title>
    <link rel="stylesheet" href="css/trackpad.css">
</head>
<body>
    <div id="app">
        <!-- Connection Status -->
        <div id="status-bar">
            <div id="connection-status" class="disconnected">
                <span class="status-dot"></span>
                <span class="status-text"></span>
            </div>
        </div>

        <!-- Main Trackpad Area -->
        <div id="trackpad">
            <div id="touch-indicator"></div>
            <div id="trackpad-label">Touch area</div>
        </div>

        <!-- Bottom Controls -->
        <div id="controls">
            <button id="btn-left" class="mouse-btn">Left Click</button>
            <button id="btn-right" class="mouse-btn">Right Click</button>
        </div>

        <!-- Expand Toggle -->
        <button id="expand-toggle" aria-label="Toggle settings">
            <svg id="expand-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M5 8L10 13L15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Collapsible Settings Panel -->
        <div id="settings" class="collapsed">
            <div class="settings-row">
                <span class="settings-label">Sensitivity</span>
                <input type="range" id="sensitivity" min="3" max="10" step="0.5" value="5">
                <span id="sensitivity-value">5.0</span>
            </div>
        </div>
    </div>

    <script src="js/trackpad.js"></script>
</body>
</html>
